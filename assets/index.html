<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转向猫 · 机器人</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>😺 转向猫机器人</h1>
        <p class="subtitle">一只傲娇的猫娘机器人，帮你处理频道消息～</p>
        <div class="card">
            <h2>🤖 机器人功能</h2>
            <ul>
                <li>✨ 转发频道消息，自动生成 TXT 文件</li>
                <li>📦 支持多文件选择（APK、图片等）</li>
                <li>⏱️ 时间显示为北京时间</li>
                <li>😾 傲娇猫娘语气，可自定义欢迎语</li>
            </ul>
        </div>
        <div class="card">
            <h2>⚙️ 管理后台</h2>
            <p>点击下方按钮进入设置页面（需要登录）</p>
            <a href="/settings" class="btn">进入设置</a>
        </div>
        <footer>
            <p>Powered by Cloudflare Workers | 开源协议 MIT</p>
        </footer>
    </div>
</body>
</html>
